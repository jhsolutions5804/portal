<!DOCTYPE html><!-- build: 20260624232120 -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JH Solutions 업무 포털</title>
<style>
  :root{
    --blue:#1D5BA6; --blue-d:#16487f; --blue-l:#5BA4CF;
    --ink:#1a2330; --sub:#6b7787; --line:#e4eaf2; --bg:#eef2f7;
    --card:#ffffff; --ok:#1b8a5a; --warn:#c0392b; --amber:#e08a1e;
    --sidebar:#13335c; --sidebar-ink:#cfe0f4; --sidebar-act:#1D5BA6;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Pretendard",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;}

  /* ====================== 공통 ====================== */
  .logo-img{height:54px; width:auto; display:block; margin:0 auto}
  .logo-mark{height:30px; width:auto; display:block}
  .btn{width:100%; border:none; border-radius:10px; padding:13px; font-size:14.5px;
    font-weight:700; cursor:pointer; font-family:inherit; transition:.15s}
  .btn:disabled{opacity:.6; cursor:default}
  .btn.primary{background:var(--blue); color:#fff}
  .btn.primary:active{background:var(--blue-d)}
  .btn.ghost{background:#fff; color:var(--blue); border:1px solid var(--blue)}
  .msg{font-size:12px; border-radius:9px; padding:9px 11px; margin-bottom:14px; display:none}
  .msg.err{display:block; background:#fdecec; color:var(--warn); border:1px solid #f6d2d2}
  .msg.ok{display:block; background:#e8f6ef; color:var(--ok); border:1px solid #c6ead7}
  .msg.info{display:block; background:#eef4fc; color:var(--blue-d); border:1px solid #d6e4f6}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:#11233a; color:#fff; font-size:12.5px; padding:10px 18px; border-radius:22px;
    opacity:0; transition:.25s; z-index:50; max-width:90%; text-align:center}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .splash{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center;
    justify-content:center; z-index:99}
  .spin{width:30px; height:30px; border:3px solid #d3deec; border-top-color:var(--blue);
    border-radius:50%; animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ====================== 인증 화면 (로그인/가입/대기) ====================== */
  .auth-stage{max-width:460px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding:0 20px 28px;}
  .authscreen{flex:1; display:none; flex-direction:column;}
  .authscreen.on{display:flex}
  .brand{text-align:center; padding:54px 0 30px;}
  .logo-sub{margin-top:10px; font-size:12.5px; color:var(--sub); letter-spacing:.3px}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px 20px; box-shadow:0 6px 22px rgba(28,60,110,.06);}
  .panel h2{margin:0 0 4px; font-size:17px}
  .panel .lead{margin:0 0 18px; font-size:12.5px; color:var(--sub)}
  label.fld{display:block; margin-bottom:13px}
  label.fld .lab{display:block; font-size:12px; color:var(--sub); margin-bottom:5px; font-weight:600}
  .inp{width:100%; border:1px solid var(--line); border-radius:10px; padding:12px 13px;
    font-size:14px; background:#fbfcfe; transition:.15s; font-family:inherit}
  .inp:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px rgba(29,91,166,.12)}
  .email-row{display:flex; align-items:stretch}
  .email-row .inp{border-top-right-radius:0; border-bottom-right-radius:0}
  .email-row .dom{display:flex; align-items:center; padding:0 12px; font-size:13px;
    color:var(--blue-d); font-weight:700; background:#eaf1fa; border:1px solid var(--line);
    border-left:none; border-radius:0 10px 10px 0; white-space:nowrap}
  .row-mt{margin-top:12px}
  .alt{margin-top:16px; text-align:center; font-size:12.5px; color:var(--sub)}
  .alt a{color:var(--blue); font-weight:700; text-decoration:none; cursor:pointer}

  /* ====================== 앱 셸 (로그인 후) ====================== */
  #s-app{display:none}
  #s-app.shown{display:flex; flex-direction:column; max-width:460px; margin:0 auto; width:100%; min-height:100vh;}

  /* 사이드바 (PC 전용) */
  .sidebar{display:none}

  /* 모바일 상단바 */
  .mtop{background:var(--card); border-bottom:1px solid var(--line);
    padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:5}
  .who{display:flex; align-items:center; gap:9px}
  .avatar{width:34px; height:34px; border-radius:50%; background:var(--blue);
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px}
  .who .nm{font-size:13px; font-weight:700; line-height:1.1}
  .who .rk{font-size:11px; color:var(--sub)}
  .logout{font-size:11.5px; color:var(--sub); background:none; border:none; cursor:pointer; padding:4px}

  .main{flex:1; display:flex; flex-direction:column; min-height:0}
  #view-home{flex:1; padding:0 20px 28px}
  #view-embed{flex:1; display:none; flex-direction:column; min-height:0}
  #view-embed.on{display:flex}
  #view-home.off{display:none !important}

  .hello{padding:22px 0 6px}
  .hello h1{margin:0; font-size:20px}
  .hello p{margin:5px 0 0; font-size:12.5px; color:var(--sub)}
  .menu{display:flex; flex-direction:column; gap:12px; margin-top:18px}
  .mcard{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; display:flex; align-items:center; gap:15px; cursor:pointer; transition:.15s; position:relative;}
  .mcard:hover{border-color:var(--blue-l)}
  .mcard:active{transform:scale(.99)}
  .mcard .ic{width:46px; height:46px; border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:22px; flex-shrink:0}
  .mcard .tx h3{margin:0; font-size:15.5px}
  .mcard .tx p{margin:3px 0 0; font-size:12px; color:var(--sub)}
  .mcard .arrow{margin-left:auto; color:var(--blue); font-size:18px; font-weight:700}
  .mcard.locked{cursor:not-allowed; opacity:.62}
  .mcard.locked:hover{border-color:var(--line)}
  .mcard.locked .arrow{display:none}
  .lockbadge{margin-left:auto; font-size:11px; color:var(--sub); background:#f1f3f7; padding:4px 9px; border-radius:20px; font-weight:600}
  .ic.plan{background:#eaf2fc; color:var(--blue)}
  .ic.hr{background:#fdeede; color:var(--amber)}
  .ic.edoc{background:#f0edfb; color:#7C3AED}
  .ic.pjt{background:#e7f5ee; color:var(--ok)}

  .adminhead{display:flex; align-items:center; gap:8px; margin:24px 0 12px}
  .adminhead h2{margin:0; font-size:15px}
  .pill{font-size:11px; font-weight:700; color:#fff; background:var(--warn); border-radius:20px; padding:2px 8px; min-width:20px; text-align:center}
  .req{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px}
  .req .nm{font-weight:700; font-size:14px}
  .req .em{font-size:12px; color:var(--blue-d); margin-top:1px}
  .req .meta{font-size:11.5px; color:var(--sub); margin-top:4px}
  .req .acts{display:flex; gap:8px; margin-top:11px}
  .req .acts .btn{flex:1; padding:9px}
  .btn.approve{background:var(--ok); color:#fff}
  .btn.reject{background:#fff; color:var(--warn); border:1px solid #eccccc}
  .empty{text-align:center; color:var(--sub); font-size:12.5px; padding:20px 0}
  .perm{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px}
  .perm .nm{font-weight:700; font-size:13.5px}
  .perm .em{font-size:11.5px; color:var(--sub); font-weight:400}
  .chips{display:flex; gap:7px; margin-top:10px; flex-wrap:wrap}
  .chip{font-size:12px; padding:6px 12px; border-radius:20px; border:1px solid var(--line);
    background:#f8fafc; color:var(--sub); cursor:pointer; font-weight:600; user-select:none}
  .chip.on{background:var(--blue); color:#fff; border-color:var(--blue)}

  .embed-top{display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5}
  .embed-top .back{font-size:13px; color:var(--blue); background:none; border:none; cursor:pointer; font-weight:700; padding:4px; flex-shrink:0}
  .embed-title{font-size:14px; font-weight:700; flex:1; text-align:center}
  .embed-open{font-size:11.5px; color:var(--sub); text-decoration:none; flex-shrink:0; background:#f1f3f7; padding:5px 10px; border-radius:7px; font-weight:600}
  .embed-frame-wrap{flex:1; min-height:0; background:#fff; position:relative}
  .embed-frame{position:absolute; inset:0; width:100%; height:100%; border:none; display:block}
  .foot{text-align:center; font-size:10.5px; color:#9aa6b4; padding:18px 0 6px}

  /* ====================== PC 레이아웃 (≥ 900px) ====================== */
  @media (min-width:900px){
    .auth-stage{max-width:420px}
    .brand{padding:8vh 0 30px}

    #s-app.shown{flex-direction:row; max-width:none; margin:0; height:100vh; min-height:0; overflow:hidden}

    /* 모바일 상단바 숨김, 사이드바 표시 */
    .mtop{display:none}
    .sidebar{display:flex; flex-direction:column; width:248px; flex-shrink:0;
      background:var(--sidebar); color:var(--sidebar-ink); height:100vh; padding:0;}
    .sb-logo{padding:22px 14px 20px; margin:0 0 0; text-align:center; border-bottom:1px solid rgba(255,255,255,.14); flex-shrink:0;}
    .sb-logo img{width:90%; max-width:200px; height:auto; display:inline-block}
    .sb-nav{display:flex; flex-direction:column; gap:4px; flex:1; overflow-y:auto; padding:10px 14px 0; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.15) transparent;}
    .sb-nav::-webkit-scrollbar{width:4px}
    .sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18); border-radius:4px}
    .sb-nav::-webkit-scrollbar-track{background:transparent}
    .sb-sec{font-size:10.5px; letter-spacing:.5px; color:#7e9ec9; font-weight:700;
      padding:6px 12px 4px; margin-top:6px; text-transform:uppercase}
    .sb-item{display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:10px;
      cursor:pointer; font-size:13.5px; font-weight:600; color:var(--sidebar-ink); transition:.13s; border:none; background:none; width:100%; text-align:left; font-family:inherit}
    .sb-item:hover{background:rgba(255,255,255,.08)}
    .sb-item.active{background:var(--sidebar-act); color:#fff}
    .sb-item .sic{width:24px; text-align:center; font-size:16px}
    .sb-item.locked{opacity:.42; cursor:not-allowed}
    .sb-item.locked:hover{background:none}
    .sb-lock{margin-left:auto; font-size:11px}
    /* 인사 드롭다운 서브메뉴 */
    .sb-group{display:flex; flex-direction:column}
    .sb-grphead .chev{margin-left:auto; font-size:11px; opacity:.65; transition:transform .15s}
    .sb-group.open .sb-grphead .chev{transform:rotate(180deg)}
    .sb-sub{display:none; flex-direction:column; gap:2px; margin:2px 0 6px}
    .sb-group.open .sb-sub{display:flex}
    .sb-subitem{display:flex; align-items:center; gap:9px; padding:8px 12px 8px 30px; border-radius:9px;
      cursor:pointer; font-size:12.5px; font-weight:500; color:var(--sidebar-ink); opacity:.82;
      border:none; background:none; width:100%; text-align:left; font-family:inherit; transition:.12s}
    .sb-subitem:hover{background:rgba(255,255,255,.07); opacity:1}
    .sb-subitem.active{background:var(--sidebar-act); color:#fff; opacity:1; font-weight:600}
    .sb-subitem .sdot{width:16px; text-align:center; font-size:11px; opacity:.7}
    .sb-spacer{flex:0}
    .sb-user{display:flex; align-items:center; gap:10px; padding:12px 14px; border-top:1px solid rgba(255,255,255,.12); flex-shrink:0;}
    .sb-user .avatar{background:var(--blue-l)}
    .sb-user .nm{font-size:13px; font-weight:700; color:#fff; line-height:1.15}
    .sb-user .rk{font-size:11px; color:#9fbbe0}
    .sb-logout{margin-left:auto; font-size:11px; color:#9fbbe0; background:none; border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:5px 9px; cursor:pointer}
    .sb-logout:hover{background:rgba(255,255,255,.08)}

    .main{height:100vh; overflow:hidden;}
    #view-home{overflow-y:auto; padding:0; flex:1; min-height:0;}
    .home-inner{max-width:960px; margin:0 auto; padding:34px 40px 60px}
    .hello{padding:0 0 6px}
    .hello h1{font-size:26px}
    .hello p{font-size:13.5px}
    .menu{display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; margin-top:24px}
    .mcard{padding:22px; flex-direction:column; align-items:flex-start; gap:14px; min-height:150px}
    .mcard .ic{width:52px; height:52px; font-size:26px}
    .mcard .tx h3{font-size:17px}
    .mcard .arrow{position:absolute; top:20px; right:20px; margin:0}
    .mcard.locked .lockbadge{position:absolute; top:20px; right:20px; margin:0}
    .admin-wrap{max-width:960px; margin:0 auto; padding:0 40px 60px}
    .adminhead h2{font-size:17px}
    #p-reqs, #p-perms{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:12px}
    #p-reqs .empty, #p-perms .empty{grid-column:1/-1}

    /* 임베드: 사이드바 옆 전체 영역 채움 */
    #view-embed{flex:1; display:none; flex-direction:column; height:100vh;}
    .embed-top{display:none}
    .embed-frame-wrap{flex:1; position:relative; overflow:hidden; background:var(--bg);}
    .embed-pad{position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column;}
    .embed-bar{display:flex; align-items:center; gap:12px; padding:12px 20px; background:var(--card); border-bottom:1px solid var(--line)}
    .embed-bar .et{font-size:15px; font-weight:700}
    .embed-bar .eo{margin-left:auto; font-size:12px; color:var(--sub); text-decoration:none; background:#f1f3f7; padding:6px 12px; border-radius:8px; font-weight:600}
  }
  @media (max-width:899px){ .embed-pad{position:absolute; inset:0; display:flex; flex-direction:column} .embed-bar{display:none} .home-inner,.admin-wrap{padding:0} }

  /* ====================== 계정 목록 & 상세 ====================== */
  .emp-table{width:100%; border-collapse:collapse; font-size:13px; margin-top:12px}
  .emp-table th{background:#EEF4FC; color:#1D5BA6; font-weight:700; padding:9px 10px; text-align:left; border-bottom:2px solid #D6E4F6}
  .emp-table td{padding:9px 10px; border-bottom:1px solid #EEF2F7; color:#1A2540}
  .emp-table tr:hover td{background:#F8FAFF; cursor:pointer}
  .emp-table .badge{display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600}
  .emp-table .badge-admin{background:#DBEAFE; color:#1D4ED8}
  .emp-table .badge-user{background:#F1F5F9; color:#64748B}

  /* 상세 패널 */
  .detail-panel{background:#fff; border:1px solid #DDE4EF; border-radius:14px; padding:24px; box-shadow:0 2px 8px rgba(29,91,166,.08)}
  .detail-row{display:flex; align-items:flex-start; gap:16px; margin-bottom:14px; border-bottom:1px solid #F1F5F9; padding-bottom:14px}
  .detail-label{min-width:80px; font-size:12px; font-weight:700; color:#5C6F8A; padding-top:2px}
  .detail-value{flex:1; font-size:14px; color:#1A2540; font-weight:500}
  .detail-input{flex:1; border:1px solid #DDE4EF; border-radius:8px; padding:8px 11px; font-size:13px; color:#1A2540; background:#FAFCFF; outline:none; font-family:inherit}
  .detail-input:focus{border-color:#1D5BA6; box-shadow:0 0 0 2px rgba(29,91,166,.1)}
  .pw-dots{letter-spacing:3px; color:#9AAABF}

  /* 개인정보 수정 모달 */
  .modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.38); z-index:40; align-items:center; justify-content:center}
  .modal-overlay.on{display:flex}
  .modal-box{background:#fff; border-radius:16px; padding:28px 24px; width:90%; max-width:420px; box-shadow:0 12px 40px rgba(0,0,0,.18)}
  .modal-title{font-size:16px; font-weight:800; color:#1A2540; margin-bottom:18px}
  .modal-field{margin-bottom:12px}
  .modal-field label{display:block; font-size:11px; font-weight:700; color:#5C6F8A; margin-bottom:4px}
  .modal-field input{width:100%; border:1px solid #DDE4EF; border-radius:8px; padding:9px 12px; font-size:13px; color:#1A2540; background:#FAFCFF; outline:none; font-family:inherit; box-sizing:border-box}
  .modal-field input:focus{border-color:#1D5BA6}
  .modal-btns{display:flex; gap:10px; margin-top:16px}
  .modal-btns button{flex:1; padding:11px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:inherit}
  .modal-cancel{background:#F1F5F9; color:#5C6F8A}
  .modal-save{background:#1D5BA6; color:#fff}

  /* ====================== 조직도 ====================== */
  #view-org{display:none; flex:1; overflow-y:auto; padding:0}
  #view-org.on{display:flex; flex-direction:column}
  .org-inner{max-width:900px; margin:0 auto; padding:30px 24px 60px}
  .org-dept-card{background:#fff; border:1px solid #DDE4EF; border-radius:14px; margin-bottom:20px; overflow:hidden; box-shadow:0 1px 4px rgba(29,91,166,.05)}
  .org-dept-hd{background:#EEF4FC; padding:12px 18px; display:flex; align-items:center; gap:10px}
  .org-dept-hd .dept-name{font-size:14px; font-weight:800; color:#1D5BA6}
  .org-dept-hd .dept-count{font-size:12px; color:#5C6F8A; background:#fff; border-radius:20px; padding:2px 9px; border:1px solid #D6E4F6}
  .org-table{width:100%; border-collapse:collapse; font-size:13px}
  .org-table th{padding:8px 14px; text-align:left; font-weight:700; color:#5C6F8A; font-size:11.5px; border-bottom:1px solid #EEF2F7; background:#FAFCFF}
  .org-table td{padding:10px 14px; border-bottom:1px solid #F4F7FB; color:#1A2540}
  .org-table tr:last-child td{border-bottom:none}
  .org-table tr:hover td{background:#F8FAFF}

  /* 사이드바 클릭 가능한 사용자 영역 */
  .sb-user-btn{display:flex; align-items:center; gap:10px; flex:1; cursor:pointer; background:none; border:none; padding:0; font-family:inherit; text-align:left}
  .sb-user-btn:hover .nm{text-decoration:underline}
</style>
</head>
<body>
<div class="splash" id="splash"><div class="spin"></div></div>

<!-- ===== 인증 화면 ===== -->

/* ---------- Portal 관리: 직원 계정 생성 ---------- */
async function createEmployee(){
  const msg=$('cr-msg'); clearMsg(msg);
  const name=($('cr-name').value||'').trim();
  const rank=($('cr-rank').value||'').trim();
  const dept=($('cr-dept').value||'').trim();
  const idp =($('cr-id').value||'').trim().toLowerCase();
  const pw  =($('cr-pw').value||'');
  if(!name)  return showMsg(msg,'err','이름을 입력하세요.');
  if(!rank)  return showMsg(msg,'err','직급을 선택하세요.');
  if(!idp)   return showMsg(msg,'err','아이디를 입력하세요.');
  if(/[@\s]/.test(idp)) return showMsg(msg,'err','아이디는 @jhsol.kr 앞부분만 입력하세요.');
  if(pw.length<6) return showMsg(msg,'err','비밀번호는 6자 이상으로 설정하세요.');
  const email=idp+DOMAIN;
  const btn=$('cr-btn'); btn.disabled=true; btn.textContent='생성 중...';
  try{
    // ── 별도 앱 인스턴스로 계정 생성 → 관리자 세션 유지 ──
    const app2=initApp2(firebaseConfig,'tmp-'+Date.now());
    const auth2=getAuth(app2);
    let targetUid=null;

    // 1) portal_users에 이미 등록된 계정인지 확인
    const qs=await getDocs(query(collection(db,'portal_users'),where('email','==',email)));
    if(!qs.empty){
      showMsg(msg,'err','이미 포털에 등록된 계정입니다. 계정 목록을 확인해 주세요.');
      return;
    }

    // 2) Firebase Auth에 계정 생성 시도 (별도 인스턴스)
    try{
      const cred=await createUserWithEmailAndPassword(auth2,email,pw);
      targetUid=cred.user.uid;
      await signOut(auth2);
    }catch(e2){
      if(e2.code==='auth/email-already-in-use'){
        // Auth엔 있지만 portal_users엔 없음 → 비밀번호로 로그인해 uid 확보
        try{
          const tmp=await signInWithEmailAndPassword(auth2,email,pw);
          targetUid=tmp.user.uid;
          await signOut(auth2);
        }catch(e3){
          showMsg(msg,'err','이미 가입된 계정입니다. 비밀번호를 확인하거나 Firebase Console에서 uid를 확인하세요.');
          return;
        }
      } else {
        showMsg(msg,'err',authErr(e2.code));
        return;
      }
    }

    // 3) 관리자 세션(auth)으로 portal_users 문서 저장
    await setDoc(doc(db,'portal_users',targetUid),{
      email, name, rank, dept,
      status:'approved', admin:false,
      perms:{plan:false,hr:false,pjt:false,edoc:false},
      createdAt:serverTimestamp()
    });
    showMsg(msg,'ok',`✅ ${name} (${email}) 계정이 생성되었습니다.`);
    ['cr-name','cr-id','cr-pw'].forEach(i=>$(i).value='');
    $('cr-rank').value=''; $('cr-dept').value='';
    loadPerms();
  }catch(e){
    showMsg(msg,'err',authErr(e.code)||e.message);
  }
  finally{ btn.disabled=false; btn.textContent='✅ 계정 생성'; }
}

let _allUsers = [];

async function loadPerms(){
  const pbox=$('p-perms'); if(!pbox) return;
  pbox.innerHTML='<div class="empty">불러오는 중...</div>';
  try{
    const qs=await getDocs(query(collection(db,'portal_users'),where('status','==','approved')));
    _allUsers=[]; qs.forEach(d=>{_allUsers.push({uid:d.id,...d.data()});});
    // 사원번호 오름차순 정렬 (없으면 createdAt 순)
    _allUsers.sort((a,b)=>{
      const ea=a.empNo||''; const eb=b.empNo||'';
      if(ea&&eb) return ea.localeCompare(eb,'ko',{numeric:true});
      if(ea) return -1; if(eb) return 1;
      return (a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0);
    });
    // 계정 목록: 전체 표시 (관리자 포함)
    renderEmpList(_allUsers);
    // 접근 권한 칩: 비관리자만
    const nonAdmins=_allUsers.filter(u=>!u.admin);
    if(!nonAdmins.length){ pbox.innerHTML='<div class="empty">일반 직원 계정이 없습니다.</div>'; return; }
    pbox.innerHTML='';
    nonAdmins.forEach(u=>{
      const el=document.createElement('div'); el.className='perm';
      el.innerHTML=`<div class="nm" style="cursor:pointer;" onclick="openEmpDetail('${u.uid}')">${u.name||'-'} <span class="em">(${u.rank||''} · ${u.email||''})</span></div><div class="chips">${MODULES.map(m=>`<span class="chip ${(u.perms&&u.perms[m.key])?'on':''}" data-u="${u.uid}" data-k="${m.key}">${m.name}</span>`).join('')}</div>`;
      pbox.appendChild(el);
    });
  }catch(e){ pbox.innerHTML=`<div class="empty">불러오기 실패: ${e.code||e.message}</div>`; }
}

function renderEmpList(list){

    <tr onclick="openEmpDetail('${u.uid}')" style="cursor:pointer;">
      <td style="color:#9AAABF; font-size:12px;">${u.empNo||String(i+1).padStart(3,'0')}</td>
      <td>${u.name||'-'}</td>
      <td>${u.rank||'-'}</td>
      <td>${u.dept||'-'}</td>
      <td>${u.email||'-'}</td>
      <td><span class="badge ${u.admin?'badge-admin':'badge-user'}">${u.admin?'관리자':'일반'}</span></td>
    </tr>`).join('');
  box.innerHTML=`<table class="emp-table">

  </table>`;
}

function getEmpNo(uid){
  // createdAt 오름차순 정렬 후 전체 순번 (001~)
  const sorted=[..._allUsers].sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));
  const idx=sorted.findIndex(x=>x.uid===uid);
  return idx>=0 ? String(idx+1).padStart(3,'0') : '---';
}

async function saveEmpDetail(){
  const msg=$('ed-msg'); clearMsg(msg);
  const empNo=($('ed-empno').value||'').trim();
  const name=($('ed-name').value||'').trim();
  const rank=$('ed-rank').value;
  const dept=$('ed-dept').value;
  const phone=($('ed-phone').value||'').trim();
  const pw=($('ed-pw').value||'');
  if(!name) return showMsg(msg,'err','이름을 입력하세요.');
  try{
    const updates={empNo,name,rank,dept,phone};
    await updateDoc(doc(db,'portal_users',_editUid),updates);
    // 비밀번호 변경은 Firebase Admin SDK 없이는 타 계정 변경 불가
    // → 안내 메시지로 대체
    if(pw){
      if(pw.length<6) return showMsg(msg,'err','비밀번호는 6자 이상이어야 합니다.');
      showMsg(msg,'info','⚠️ 타 계정 비밀번호는 Firebase Console에서 직접 변경하세요.');
    } else {
      // _allUsers 캐시 업데이트
      const idx=_allUsers.findIndex(x=>x.uid===_editUid);
      if(idx>=0) Object.assign(_allUsers[idx],updates);
      toast('✅ 저장되었습니다.');
      showView('admin');
      loadPerms();
    }
  }catch(e){ showMsg(msg,'err',e.message); }
}

async function loadOrg(){
  const box=$('org-content'); if(!box) return;
  box.innerHTML='<div class="empty">불러오는 중...</div>';
  try{
    const qs=await getDocs(query(collection(db,'portal_users'),where('status','==','approved')));
    const users=[]; qs.forEach(d=>users.push({uid:d.id,...d.data()}));
    const DEPT_ORDER=['(미지정)','사업본부','현장관리팀','인력배치팀','경영지원본부','경영총무팀','영업기획팀'];
    const RANK_ORDER=['대표','부사장','차장','과장','대리','사원'];
    const deptMap={};
    DEPT_ORDER.forEach(d=>{deptMap[d]=[];});
    users.forEach(u=>{
      const d=(u.dept&&DEPT_ORDER.includes(u.dept))?u.dept:'(미지정)';
      deptMap[d].push(u);
    });
    let html='';
    DEPT_ORDER.forEach(dept=>{
      const list=deptMap[dept]; if(!list.length) return;
      list.sort((a,b)=>{
        const ea=a.empNo||''; const eb=b.empNo||'';
        if(ea&&eb) return ea.localeCompare(eb,'ko',{numeric:true});
        if(ea) return -1; if(eb) return 1;
        return (a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0);
      });
      const rows=list.map((u,i)=>`
        <tr>
          <td>${u.empNo||String(i+1).padStart(3,'0')}</td>
          <td>${dept}</td>
          <td>${u.name||'-'}</td>
          <td>${u.rank||'-'}</td>
          <td>${u.phone||'-'}</td>
          <td>${u.email||'-'}</td>
        </tr>`).join('');
      html+=`
        <div class="org-dept-card">
          <div class="org-dept-hd">
            <span class="dept-name">📂 ${dept}</span>
            <span class="dept-count">${list.length}명</span>
          </div>
          <table class="org-table">
            <thead><tr><th>사원번호</th><th>소속</th><th>이름</th><th>직급</th><th>전화번호</th><th>메일주소</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    });
    box.innerHTML=html||'<div class="empty">등록된 직원이 없습니다.</div>';
  }catch(e){ box.innerHTML=`<div class="empty">불러오기 실패: ${e.code||e.message}</div>`; }
}

function fmtPhone(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length<=3) el.value=v;
  else if(v.length<=7) el.value=v.slice(0,3)+'-'+v.slice(3);
  else el.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
}
function openMyProfile(){
  $('my-pw').value='';
  $('my-phone').value=me.phone||'';
  clearMsg($('modal-msg'));
  $('my-profile-modal').classList.add('on');
}
function closeMyProfile(){ $('my-profile-modal').classList.remove('on'); }
async function saveMyProfile(){
  const msg=$('modal-msg'); clearMsg(msg);
  const pw=$('my-pw').value;
  const phone=$('my-phone').value.trim();
  try{
    if(phone!==undefined){
      await updateDoc(doc(db,'portal_users',me.uid),{phone});
      me.phone=phone;
    }
    if(pw){
      if(pw.length<6) return showMsg(msg,'err','비밀번호는 6자 이상이어야 합니다.');
      const {updatePassword}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      await updatePassword(auth.currentUser,pw);
    }
    toast('✅ 정보가 저장되었습니다.');
    closeMyProfile();
  }catch(e){ showMsg(msg,'err',(e.code?authErr(e.code):null)||e.message); }
}


async function togglePerm(uid,key,el){
  const on=!el.classList.contains('on'); el.classList.toggle('on');
  try{ await updateDoc(doc(db,'portal_users',uid),{['perms.'+key]:on}); }
  catch(e){ el.classList.toggle('on'); toast('실패: '+(e.code||e.message)); }
}

document.addEventListener('click',e=>{

});
$('login-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
function enterPortal(){
  $('login-pw').value=''; clearMsg($('login-msg'));
  const ini=(me.name||'·').charAt(0);
  $('p-name').textContent=me.name||'-'; $('p-rank').textContent=me.rank||'-'; $('p-avatar').textContent=ini;
  $('sb-name').textContent=me.name||'-'; $('sb-rank').textContent=me.rank||'-'; $('sb-avatar').textContent=ini;
  $('p-hello').textContent=`${me.name||''} ${me.rank||''}님, 안녕하세요 👋`;
  renderMenu();
  showApp(); showView('home');
  resetAutoLogout();
}
function renderMenu(){
  const wrap=$('p-menu'); wrap.innerHTML='';
  const nav=$('sb-nav'); nav.innerHTML='';
  // 사이드바: 홈
  const home=document.createElement('button');
  home.className='sb-item active'; home.dataset.nav='home';
  home.innerHTML='<span class="sic">🏠</span><span>포털 홈</span>';
  home.onclick=()=>showView('home');
  nav.appendChild(home);
  const sec=document.createElement('div'); sec.className='sb-sec'; sec.textContent='업무';
  nav.appendChild(sec);
  MODULES.forEach(m=>{
    const allowed=me.admin||(me.perms&&me.perms[m.key]);
    // 홈 카드
    const card=document.createElement('div');
    card.className='mcard'+(allowed?'':' locked');
    card.innerHTML=`<div class="ic ${m.ic}">${m.emoji}</div><div class="tx"><h3>${m.name}</h3><p>${m.desc}</p></div>${allowed?'<span class="arrow">›</span>':'<span class="lockbadge">🔒 권한 없음</span>'}`;
    if(allowed) card.onclick=()=>{
      const fs=SUBTABS[m.key]?SUBTABS[m.key][0]:null;
      openModule(m, fs?fs.key:null, fs?fs.url||null:null);
    };
    wrap.appendChild(card);
    // 사이드바 항목
    if (SUBTABS[m.key] && allowed) {
      // 확장형 드롭다운 (기획·인사)
      const grp=document.createElement('div'); grp.className='sb-group'; grp.dataset.mod=m.key;
      const head=document.createElement('button');
      head.className='sb-item sb-grphead'; head.dataset.nav=m.key;
      head.innerHTML=`<span class="sic">${m.emoji}</span><span>${m.name}</span><span class="chev">▾</span>`;
      // 아코디언: 하나를 열면 나머지는 닫힘
      head.onclick=()=>{
        const willOpen=!grp.classList.contains('open');
        document.querySelectorAll('#sb-nav .sb-group').forEach(g=>g.classList.remove('open'));
        if(willOpen) grp.classList.add('open');
      };
      const sub=document.createElement('div'); sub.className='sb-sub';
      SUBTABS[m.key].forEach(st=>{
        const sbtn=document.createElement('button');
        sbtn.className='sb-subitem'; sbtn.dataset.nav=m.key; sbtn.dataset.sub=st.key;
        sbtn.innerHTML=`<span class="sdot">${st.emoji}</span><span>${st.name}</span>`;
        sbtn.onclick=()=>openModule(m, st.key, st.url||null);
        sub.appendChild(sbtn);
      });
      grp.appendChild(head); grp.appendChild(sub);
      nav.appendChild(grp);
    } else {
      const it=document.createElement('button');
      it.className='sb-item'+(allowed?'':' locked'); it.dataset.nav=m.key;
      it.innerHTML=`<span class="sic">${m.emoji}</span><span>${m.name}</span>${allowed?'':'<span class="sb-lock">🔒</span>'}`;
      if(allowed) it.onclick=()=>openModule(m);
      nav.appendChild(it);
    }
  });
  // 기본: 첫 번째 드롭다운 그룹은 닫힌 채로 시작
  const firstGrp=nav.querySelector('.sb-group');
  // (아무것도 열지 않음 — 포털 홈 진입 시 항상 닫힌 상태)

  // 조직도 메뉴 (모든 로그인 사용자)
  {
    const div2=document.createElement('div');
    div2.style.cssText='height:1px; background:rgba(255,255,255,0.1); margin:10px 8px;';
    nav.appendChild(div2);
    const org=document.createElement('button');
    org.className='sb-item'; org.dataset.nav='org';
    org.innerHTML='<span class="sic">🏢</span><span>조직도</span>';
    org.onclick=()=>{ showView('org'); loadOrg();
      document.querySelectorAll('#sb-nav .sb-item, #sb-nav .sb-subitem').forEach(b=>b.classList.remove('active'));
      org.classList.add('active');
    };
    nav.appendChild(org);
  }

  // Portal 관리 (관리자 전용) — 구분선 + 버튼
  if(me.admin){
    const div=document.createElement('div');
    div.style.cssText='height:1px; background:rgba(255,255,255,0.1); margin:10px 8px;';
    nav.appendChild(div);
    const adm=document.createElement('button');
    adm.className='sb-item'; adm.dataset.nav='admin';
    adm.innerHTML='<span class="sic">⚙️</span><span>Portal 관리</span>';
    adm.onclick=()=>{ showView('admin'); loadPerms();
      document.querySelectorAll('#sb-nav .sb-item, #sb-nav .sb-subitem').forEach(b=>b.classList.remove('active'));
      adm.classList.add('active');
    };
    nav.appendChild(adm);
  }
}
function openModule(m, tab, overrideUrl){
  const actualUrl=overrideUrl||m.url;
  if(!actualUrl){ toast(m.name+' 메뉴는 준비 중입니다.'); return; }
  _activeMod=m.key;
  _activeSub=overrideUrl?tab:(SUBTABS[m.key]?(tab||SUBTABS[m.key][0].key):null);
  const fullUrl=overrideUrl?overrideUrl:(m.url+(tab?('&tab='+tab):''));

  // iframe이 이미 같은 앱으로 로드된 경우 → postMessage로 탭 전환 (overrideUrl 없을 때만)
  if (!overrideUrl && SUBTABS[m.key] && _embUrl===m.url && tab) {
    try {
      const frame=$('emb-frame');
      frame.contentWindow.postMessage({source:'jh-portal', action:'goTab', key:tab}, '*');
      document.querySelectorAll('#sb-nav .sb-group').forEach(g=>g.classList.toggle('open', g.dataset.mod===m.key));
      showView('embed');
      return;
    } catch(e) {}
  }

  // 새로 로드: iframe에 src 설정
  const frame=$('emb-frame');
  frame.src = fullUrl;
  _embUrl = overrideUrl||m.url;

  $('emb-title').textContent=m.name; $('emb-title2').textContent=m.name;
  $('emb-open').href=fullUrl; $('emb-open2').href=fullUrl;
  document.querySelectorAll('#sb-nav .sb-group').forEach(g=>g.classList.toggle('open', g.dataset.mod===m.key));
  showView('embed');
}


onAuthStateChanged(auth, async user=>{
  $('splash').style.display='none';

  if(!user && !me){ showAuth('s-login'); }
});


/* ── 자동 로그아웃 (30분 무동작) ── */
const AUTO_LOGOUT_MS = 30 * 60 * 1000;
let _autoLogoutTimer = null;

function resetAutoLogout(){
  if(!me) return;
  clearTimeout(_autoLogoutTimer);
  _autoLogoutTimer = setTimeout(()=>{
    toast('⏰ 30분 동안 활동이 없어 자동 로그아웃됩니다.');
    setTimeout(()=>doLogout(), 2000);
  }, AUTO_LOGOUT_MS);
}

['click','keydown','mousemove','touchstart','scroll'].forEach(evt=>{
  document.addEventListener(evt, resetAutoLogout, { passive:true });
});

function doLogout(){ clearTimeout(_autoLogoutTimer); signOut(auth).then(()=>{ me=null; $('login-pw').value=''; showAuth('s-login'); }); }
