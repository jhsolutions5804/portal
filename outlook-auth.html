<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft 인증 처리 중...</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
           background:#F4F7FB; display:flex; align-items:center; justify-content:center;
           height:100vh; }
    .card { background:#fff; border-radius:16px; padding:40px 48px; text-align:center;
            box-shadow:0 4px 24px rgba(0,0,0,.08); max-width:360px; width:100%; }
    .icon { font-size:48px; margin-bottom:16px; }
    .title { font-size:17px; font-weight:700; color:#1a2535; margin-bottom:8px; }
    .sub { font-size:13px; color:#9AAABF; }
    .err { font-size:13px; color:#DC2626; margin-top:12px; }
    .btn { margin-top:20px; padding:10px 24px; background:#1D5BA6; color:#fff;
           border:none; border-radius:8px; font-size:14px; font-weight:600;
           cursor:pointer; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📬</div>
  <div class="title" id="title">Microsoft 인증 처리 중...</div>
  <div class="sub" id="sub">잠시만 기다려 주세요.</div>
  <div class="err" id="err" style="display:none;"></div>
  <button class="btn" id="btn" style="display:none;" onclick="goPortal()">포털로 돌아가기</button>
</div>

<script type="module">
const MSAL_ESM_URL  = 'https://esm.sh/@azure/msal-browser@2.38.4';
const MSAL_AUTH     = {
  clientId:    '97f0a368-a746-42f9-8782-38ac8cc0962c',
  authority:   'https://login.microsoftonline.com/548fcb48-1ab8-4c47-8242-bc098ea80416',
  redirectUri: 'https://jhsolutions5804.github.io/portal/outlook-auth.html'
};
const MSAL_SCOPES   = ['Mail.Read', 'User.Read'];
const PORTAL_URL    = 'https://jhsolutions5804.github.io/portal/';

function goPortal() {
  window.location.href = PORTAL_URL;
}

async function handleAuth() {
  try {
    const { PublicClientApplication } = await import(MSAL_ESM_URL);
    const app = new PublicClientApplication({
      auth: MSAL_AUTH,
      cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
    });

    // redirect 응답 처리
    const res = await app.handleRedirectPromise();

    if (res && res.accessToken) {
      // 토큰 sessionStorage에 저장 → 포털에서 읽음
      sessionStorage.setItem('msal_access_token',  res.accessToken);
      sessionStorage.setItem('msal_account_name',  res.account?.name || '');
      sessionStorage.setItem('msal_account_id',    res.account?.homeAccountId || '');
      sessionStorage.setItem('msal_token_expiry',  String(Date.now() + 55 * 60 * 1000)); // 55분
      sessionStorage.setItem('msal_pending_uid',   sessionStorage.getItem('msal_redirect_uid') || '');
      sessionStorage.removeItem('msal_redirect_uid');

      document.getElementById('title').textContent = '✅ 인증 완료!';
      document.getElementById('sub').textContent   = '포털로 이동합니다...';

      // 1초 후 포털로 자동 이동
      setTimeout(goPortal, 1000);

    } else {
      // handleRedirectPromise 결과 없음 → 직접 접근한 경우
      // 로그인 시작
      const accounts = app.getAllAccounts();
      if (accounts.length > 0) {
        // 이미 계정 있으면 silent 시도
        try {
          const silent = await app.acquireTokenSilent({ scopes: MSAL_SCOPES, account: accounts[0] });
          sessionStorage.setItem('msal_access_token', silent.accessToken);
          sessionStorage.setItem('msal_account_name', accounts[0].name || '');
          sessionStorage.setItem('msal_account_id',   accounts[0].homeAccountId || '');
          sessionStorage.setItem('msal_token_expiry', String(Date.now() + 55 * 60 * 1000));
          document.getElementById('title').textContent = '✅ 인증 완료!';
          document.getElementById('sub').textContent   = '포털로 이동합니다...';
          setTimeout(goPortal, 1000);
          return;
        } catch(e) { /* silent 실패 → redirect 진행 */ }
      }
      // redirect 로그인 시작
      document.getElementById('sub').textContent = 'Microsoft 로그인 페이지로 이동합니다...';
      await app.acquireTokenRedirect({ scopes: MSAL_SCOPES });
    }

  } catch(e) {
    document.getElementById('title').textContent      = '인증 오류';
    document.getElementById('sub').textContent        = '아래 오류를 확인해 주세요.';
    document.getElementById('err').textContent        = e.message;
    document.getElementById('err').style.display      = '';
    document.getElementById('btn').style.display      = '';
  }
}

handleAuth();
</script>
</body>
</html>
